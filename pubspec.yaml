name: trosko
description: 'Budget tracking application in Flutter.'
publish_to: 'none'
version: 2.3.0+230

#
# DEPLOYING APP
# 1. `pubspec.yaml` -> Bump version number
# 2. `release_notes.txt` -> Update changelog for all languages
# 3. `default.txt` -> Update changelog for all languages
#

#
# Android
# `cd android/ && fastlane play_store_release`
#
# GitHub Releases
# `cd android/ && fastlane github_release`
#
# iOS
# `cd ios/ && fastlane app_store_release`
#

environment:
  sdk: 3.12.2

dependencies:
  flutter:
    sdk: flutter

  background_fetch: 1.7.0
  calendar_date_picker2: 3.0.0
  cloud_firestore: 6.6.0
  diacritic: 0.1.6
  easy_localization: 3.0.8
  firebase_ai: 3.13.1
  firebase_auth: 6.5.4
  firebase_core: 4.11.0
  fl_chart: 1.2.0
  flutter_animate: 4.5.2
  flutter_colorpicker: 1.1.0
  flutter_displaymode: 0.7.0
  flutter_foreground_task: 9.2.2
  flutter_map: 8.3.1
  flutter_local_notifications: 22.0.1
  flutter_swipe_action_cell: 3.1.8
  fuzzywuzzy: 1.2.0
  geocoding: 5.0.0
  get_it: 9.2.1
  google_sign_in: 7.2.0
  hive_ce: 2.19.3
  hive_ce_flutter: 2.3.4
  intl: 0.20.3
  latlong2: 0.10.1
  notification_listener_service: 1.0.0
  package_info_plus: 10.2.0
  scroll_datetime_picker: 0.2.2
  sign_in_with_apple: 8.1.0
  speech_to_text: 7.4.0
  string_similarity: 2.2.0
  uuid: 4.5.3
  vector_map_tiles: 9.0.0-beta.8
  watch_it: 2.4.2

  phosphor_flutter:
    git:
      url: https://github.com/phosphor-icons/flutter.git
      ref: 514f0a883571c4453dbd6ee3041d1dcba4fb8fc7

dev_dependencies:
  build_runner: 2.15.0
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.8
  hive_ce_generator: 1.11.2

dependency_overrides:
  intl: 0.20.3
  latlong2: 0.10.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/

  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/ProductSans/ProductSans-Thin.ttf
          weight: 100
        - asset: assets/ProductSans/ProductSans-Light.ttf
          weight: 300
        - asset: assets/ProductSans/ProductSans-Regular.ttf
          weight: 500
        - asset: assets/ProductSans/ProductSans-Medium.ttf
          weight: 600
        - asset: assets/ProductSans/ProductSans-Bold.ttf
          weight: 700
        - asset: assets/ProductSans/ProductSans-Black.ttf
          weight: 900


# Run code generation - `flutter pub run build_runner build -d`

# Configuration for 'flutter_launcher_icons'
# Run icon generation with 'flutter pub run flutter_launcher_icons:main'
flutter_launcher_icons:
  image_path_android: 'assets/icon.png'
  image_path_ios: 'assets/icon.png'
  android: true
  ios: true
  adaptive_icon_background: 'assets/background.png'
  adaptive_icon_foreground: 'assets/splash_icon.png'
  adaptive_icon_foreground_inset: 16
  adaptive_icon_monochrome: 'assets/monochrome.png'
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: '#EDEDF4'
  web:
    generate: true
    image_path: 'assets/icon.png'
    background_color: '#EDEDF4'
    theme_color: '#EDEDF4'
  windows:
    generate: true
    image_path: 'assets/icon.png'
    icon_size: 48
  macos:
    generate: true
    image_path: 'assets/icon.png'

# Configuration for 'flutter_native_splash'
# Run splash screen generation with 'flutter pub run flutter_native_splash:create'
flutter_native_splash:
  background_image: 'assets/splash.png'
  background_image_dark: 'assets/splash_dark.png'
  android_12:
    image: 'assets/splash_icon.png'
    image_dark: 'assets/monochrome.png'
    color: '#EDEDF4'
    color_dark: '#1D2024'
